<!--================================
            PROJECTS
=================================-->

<section id="projects" class="projects">


    <div class="section-title">

        <span>
            repositories.sh
        </span>

        <h2>
            Featured Projects
        </h2>

    </div>


    <div class="projects-grid">


    {%- for p in projects%}
    <div class="project-card glass">
        <div class="project-header">
            <span class="project-icon">{{ p.icon }}</span>
            <h3>{{ p.title }}</h3>
        </div>

        <p>{{ p.description }}</p>

        <div class="project-stack">
            {%- for tech in p.stack %}
            <span>{{ tech }}</span>
            {%- endfor %}
        </div>
    </div>
    {%- endfor %}


    </div>


</section>
